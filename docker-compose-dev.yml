version: '3.8'

services:
  dbdev:
    image: postgres:15
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=fursvp
      - POSTGRES_USER=fursvp
      - POSTGRES_PASSWORD=fursvp
    # ports:
      # - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fursvp"]
      interval: 10s
      timeout: 5s
      retries: 5

  webdev:
    build: .
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 fursvp.wsgi:application"
    volumes:
      - .:/app
      - static_volume_dev:/app/staticfiles
      - media_volume_dev:/app/media
    ports:
      - "8005:8000"
    environment:
      - DEBUG=True
      - DB_NAME=fursvp
      - DB_USER=fursvp
      - DB_PASSWORD=fursvp
      - DB_HOST=dbdev
      - DB_PORT=5432
      - BLUESKY_HANDLE=${BLUESKY_HANDLE}
      - BLUESKY_APP_PASSWORD=${BLUESKY_APP_PASSWORD}
    depends_on:
      dbdev:
        condition: service_healthy
    env_file:
      - .env

volumes:
  postgres_data_dev:
  static_volume_dev:
  media_volume_dev:

