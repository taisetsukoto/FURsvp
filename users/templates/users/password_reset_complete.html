{% extends 'events/base.html' %}
{% block title %}Password Reset Complete - FURsvp{% endblock %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="auth-glass-card">
                <div class="auth-page-header">
                    <div class="auth-page-icon">
                        <i class="material-icons">check_circle</i>
                    </div>
                    <h1 class="auth-page-title">Password updated</h1>
                    <p class="auth-page-subtitle">Your new password is ready to use</p>
                </div>
                <div class="auth-status-box auth-status-box--success">
                    You can now sign in with your new password.
                </div>
                <a href="{% url 'login' %}" class="profile-btn-primary text-decoration-none">
                    <i class="material-icons">login</i> Sign in
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
